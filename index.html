<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>Tamagotchi</title>
</head>
<body>
    <img src="assets/img/sun.png" id="sun" alt="sun">

    <div id="apple-timer" class="timer hidden">Appels vallen: 20s</div>

    <div id="tamagotchi-moodchecker" class="card">
        <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="smile"></div>
        </div>
        <h1>Prima!</h1>
        <div class="mood-rows">
            <article class="mood-row">
                <span>Honger</span>
                <div class="track track-food">
                    <div class="fill" style="width: 80%"></div>
                    <img src="assets/img/carrot.png" alt="wortel" id="wortel" class="icon">
                </div>
            </article>
            <article class="mood-row">
                <span>Spelen</span>
                <div class="track track-play">
                    <div class="fill" style="width: 65%"></div>
                    <img src="assets/img/toys.png" alt="spelen" class="icon">
                </div>
            </article>
            <article class="mood-row">
                <span>Dorst</span>
                <div class="track track-water">
                    <div class="fill" style="width: 55%"></div>
                    <img src="assets/img/water.png" alt="water" class="icon">
                </div>
            </article>
            <article class="mood-row">
                <span>Slaap</span>
                <div class="track track-sleep">
                    <div class="fill" style="width: 45%"></div>
                    <img src="assets/img/pillow.png" alt="slaap" class="icon">
                </div>
            </article>
        </div>
    </div>

    <img src="assets/img/rabbit-sittingright.png" alt="rabbit sitting" id="rabbit-sitting">

    <img src="assets/img/tree.png" alt="tree" id="tree">

    <img src="assets/img/grass.png" id="grass" alt="grass">

    <section id="runner-game" class="hidden" aria-live="polite">
        <div class="runner-hud">
            <span id="runner-status">Ren door naar de finish!</span>
            <span id="runner-distance">Finish: 100%</span>
        </div>
        <div id="runner-track">
            <img src="assets/img/rabbitrunningright.png" alt="rennend konijn" id="runner-rabbit">
            <div id="runner-obstacles"></div>
            <div id="runner-finish" class="hidden">FINISH</div>
        </div>
    </section>

    <script>
        const socketHost = window.location.hostname || 'localhost';
        const socket = io('http://' + socketHost + ':3000');
        console.log('Index connected to socket');
        socket.on('connect', () => console.log('Index socket connected:', socket.id));
        socket.on('connect_error', (error) => console.error('Index socket error:', error.message));

        const fills = {
            food: document.querySelector('.track-food .fill'),
            play: document.querySelector('.track-play .fill'),
            water: document.querySelector('.track-water .fill'),
            sleep: document.querySelector('.track-sleep .fill')
        };

        // Load saved values from localStorage
        Object.keys(fills).forEach(key => {
            const saved = localStorage.getItem(`tamagotchi-${key}`);
            if (saved) {
                fills[key].style.width = saved;
            }
        });

        // Update face and text based on average mood
        function updateMood() {
            const avg = Object.values(fills).reduce((sum, fill) => sum + parseInt(fill.style.width), 0) / 4;
            const face = document.querySelector('.face');
            const h1 = document.querySelector('h1');
            face.className = 'face'; // reset classes
            if (avg > 75) {
                face.classList.add('wonderful');
                h1.textContent = 'Geweldig!';
            } else if (avg > 50) {
                face.classList.add('ok');
                h1.textContent = 'Prima!';
            } else if (avg > 25) {
                face.classList.add('sad');
                h1.textContent = 'Matig';
            } else {
                face.classList.add('angry');
                h1.textContent = 'Slecht';
            }
        }

        // Initial update
        updateMood();

        // Save current values to localStorage
        function saveBars() {
            Object.keys(fills).forEach(key => {
                localStorage.setItem(`tamagotchi-${key}`, fills[key].style.width);
            });
        }

        function decreaseBar(fill, amount = 1) {
            let current = parseInt(fill.style.width);
            if (current > 0) {
                fill.style.width = (current - amount) + '%';
                saveBars();
                updateMood();
            }
        }

        function increaseBar(bar) {
            console.log('Increasing bar:', bar);
            const fill = fills[bar];
            if (!fill) return;
            let current = parseInt(fill.style.width);
            if (current < 100) {
                fill.style.width = Math.min(100, current + 5) + '%';
                saveBars();
                updateMood();
            }
        }

        socket.on('increase-bar', (bar) => {
            if (bar === 'play-game') {
                console.log('Starting runner mini-game (fallback via increase-bar)');
                startRunnerGame();
                return;
            }
            increaseBar(bar);
        });

        socket.on('increase-all', () => {
            console.log('Increasing all bars');
            Object.keys(fills).forEach(key => {
                const fill = fills[key];
                let current = parseInt(fill.style.width);
                if (current < 100) {
                    fill.style.width = Math.min(100, current + 5) + '%';
                }
            });
            saveBars();
            updateMood();
        });

        socket.on('fall-apples', () => {
            console.log('Apples falling!');
            startAppleFall();
        });

        const rabbit = document.getElementById('rabbit-sitting');
        const runnerGame = document.getElementById('runner-game');
        const runnerTrack = document.getElementById('runner-track');
        const runnerRabbit = document.getElementById('runner-rabbit');
        const runnerObstacles = document.getElementById('runner-obstacles');
        const runnerFinish = document.getElementById('runner-finish');
        const runnerStatus = document.getElementById('runner-status');
        const runnerDistance = document.getElementById('runner-distance');
        let walkInterval = null;
        let moveInterval = null;
        let currentLeft = 0;
        let direction = 0; // -1 for left, 1 for right, 0 for stop
        let isRunnerActive = false;
        let runnerJumping = false;
        let runnerRabbitBottom = 40;
        let runnerVelocity = 0;
        let runnerFrame = null;
        let runnerStartTs = 0;
        let runnerElapsed = 0;
        let runnerLastTs = 0;
        let runnerLastSpawnTs = 0;
        let runnerObstaclesList = [];
        let runnerFinished = false;
        const runnerDurationMs = 13000;
        const runnerGroundBottom = 40;
        const runnerRabbitLeft = 140;

        function resetRunnerVisuals() {
            runnerRabbitBottom = runnerGroundBottom;
            runnerRabbit.style.bottom = runnerRabbitBottom + 'px';
            runnerRabbit.style.left = runnerRabbitLeft + 'px';
            runnerRabbit.src = 'assets/img/rabbitrunningright.png';
            runnerObstacles.innerHTML = '';
            runnerObstaclesList = [];
            runnerFinish.classList.add('hidden');
            runnerFinish.style.left = '100%';
            runnerStatus.textContent = 'Ren door naar de finish!';
            runnerDistance.textContent = 'Finish: 100%';
            runnerFinished = false;
        }

        function spawnFence() {
            const fence = document.createElement('img');
            fence.src = 'assets/img/fence.png';
            fence.alt = 'hek';
            fence.className = 'runner-fence';
            runnerObstacles.appendChild(fence);
            runnerObstaclesList.push({
                el: fence,
                x: runnerTrack.clientWidth + 20,
                width: 86,
                height: 80
            });
        }

        function startRunnerGame() {
            if (isRunnerActive) return;
            isRunnerActive = true;
            runnerJumping = false;
            runnerVelocity = 0;
            resetRunnerVisuals();
            runnerGame.classList.remove('hidden');
            runnerStartTs = performance.now();
            runnerLastTs = runnerStartTs;
            runnerLastSpawnTs = runnerStartTs;
            runnerFrame = requestAnimationFrame(updateRunnerGame);
        }

        function stopRunnerGame(win) {
            isRunnerActive = false;
            if (runnerFrame) {
                cancelAnimationFrame(runnerFrame);
                runnerFrame = null;
            }

            if (win) {
                runnerStatus.textContent = 'Yes! Finish gehaald. Spelen +20';
                for (let i = 0; i < 4; i++) {
                    increaseBar('play');
                }
            } else {
                runnerStatus.textContent = 'Botsing met een hek. Probeer opnieuw!';
            }

            setTimeout(() => {
                runnerGame.classList.add('hidden');
                resetRunnerVisuals();
            }, 1800);
        }

        function triggerRunnerJump() {
            if (!isRunnerActive || runnerJumping) return;
            runnerJumping = true;
            runnerVelocity = 12;
        }

        function detectRunnerCollision(fenceData) {
            const rabbitBox = {
                left: runnerRabbitLeft + 20,
                right: runnerRabbitLeft + 82,
                top: runnerRabbitBottom + 24,
                bottom: runnerRabbitBottom + 118
            };

            const fenceBox = {
                left: fenceData.x + 8,
                right: fenceData.x + fenceData.width - 8,
                top: runnerGroundBottom,
                bottom: runnerGroundBottom + fenceData.height
            };

            return (
                rabbitBox.left < fenceBox.right &&
                rabbitBox.right > fenceBox.left &&
                rabbitBox.top < fenceBox.bottom &&
                rabbitBox.bottom > fenceBox.top
            );
        }

        function updateRunnerGame(ts) {
            if (!isRunnerActive) return;

            const delta = ts - runnerLastTs;
            runnerLastTs = ts;
            runnerElapsed = ts - runnerStartTs;

            if (runnerElapsed >= runnerDurationMs && !runnerFinished) {
                runnerFinished = true;
                runnerFinish.classList.remove('hidden');
                runnerFinish.style.left = runnerTrack.clientWidth + 10 + 'px';
            }

            if (!runnerFinished && ts - runnerLastSpawnTs > 1350) {
                spawnFence();
                runnerLastSpawnTs = ts;
            }

            if (runnerJumping) {
                runnerRabbitBottom += runnerVelocity;
                runnerVelocity -= 0.55;
                if (runnerRabbitBottom <= runnerGroundBottom) {
                    runnerRabbitBottom = runnerGroundBottom;
                    runnerVelocity = 0;
                    runnerJumping = false;
                }
                runnerRabbit.style.bottom = runnerRabbitBottom + 'px';
            }

            const speed = 0.35 * delta;
            runnerObstaclesList = runnerObstaclesList.filter((fenceData) => {
                fenceData.x -= speed;
                fenceData.el.style.left = fenceData.x + 'px';

                if (detectRunnerCollision(fenceData)) {
                    stopRunnerGame(false);
                    return false;
                }

                if (fenceData.x < -fenceData.width) {
                    fenceData.el.remove();
                    return false;
                }
                return true;
            });

            if (runnerFinished) {
                const currentLeft = parseFloat(runnerFinish.style.left);
                runnerFinish.style.left = (currentLeft - speed) + 'px';
                if (currentLeft <= runnerRabbitLeft + 70) {
                    stopRunnerGame(true);
                    return;
                }
            } else {
                const remainingPct = Math.max(0, Math.ceil((1 - runnerElapsed / runnerDurationMs) * 100));
                runnerDistance.textContent = `Finish: ${remainingPct}%`;
            }

            runnerRabbit.src = Math.floor(ts / 130) % 2 === 0
                ? 'assets/img/rabbitrunningright.png'
                : 'assets/img/rabbit-sittingright.png';

            runnerFrame = requestAnimationFrame(updateRunnerGame);
        }

        socket.on('start-run-level', () => {
            console.log('Starting runner mini-game');
            startRunnerGame();
        });

        socket.on('startRunLevel', () => {
            console.log('Starting runner mini-game (camelCase event)');
            startRunnerGame();
        });

        socket.on('start-move-left', () => {
            console.log('Received start-move-left');
            if (isRunnerActive) return;
            if (moveInterval) clearInterval(moveInterval);
            direction = -1;
            let isRunning = false;
            moveInterval = setInterval(() => {
                currentLeft += direction * 18;
                rabbit.style.left = currentLeft + 'px';
                rabbit.src = isRunning ? 'assets/img/rabbitsittingleft.png' : 'assets/img/rabbitrunningleft.png';
                isRunning = !isRunning;
            }, 200);
        });

        socket.on('stop-move-left', () => {
            console.log('Received stop-move-left');
            if (isRunnerActive) return;
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
            rabbit.src = 'assets/img/rabbitsittingleft.png';
            direction = 0;
        });

        socket.on('start-move-right', () => {
            console.log('Received start-move-right');
            if (isRunnerActive) return;
            if (moveInterval) clearInterval(moveInterval);
            direction = 1;
            let isRunning = false;
            moveInterval = setInterval(() => {
                currentLeft += direction * 18;
                rabbit.style.left = currentLeft + 'px';
                rabbit.src = isRunning ? 'assets/img/rabbit-sittingright.png' : 'assets/img/rabbitrunningright.png';
                isRunning = !isRunning;
            }, 200);
        });

        socket.on('stop-move-right', () => {
            console.log('Received stop-move-right');
            if (isRunnerActive) return;
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
            rabbit.src = 'assets/img/rabbit-sittingright.png';
            direction = 0;
        });

        let isJumping = false;
        const groundBottom = 90;

        socket.on('jump', () => {
            if (isRunnerActive) {
                triggerRunnerJump();
                return;
            }
            if (isJumping) return;
            isJumping = true;
            let currentBottom = groundBottom;
            let velocity = 12;

            // animatie tijdens sprong richting meeloop
            let jumpAnim = false;
            const isLeft = rabbit.src.includes('left');
            const runSrc = isLeft ? 'assets/img/rabbitrunningleft.png' : 'assets/img/rabbitrunningright.png';
            const sitSrc = isLeft ? 'assets/img/rabbitsittingleft.png' : 'assets/img/rabbit-sittingright.png';

            const animInterval = setInterval(() => {
                rabbit.src = jumpAnim ? runSrc : sitSrc;
                jumpAnim = !jumpAnim;
            }, 150);

            const jumpInterval = setInterval(() => {
                currentBottom += velocity;
                velocity -= 0.5;
                rabbit.style.bottom = currentBottom + 'px';

                if (currentBottom <= groundBottom && velocity < 0) {
                    clearInterval(jumpInterval);
                    clearInterval(animInterval);
                    rabbit.style.bottom = groundBottom + 'px';
                    rabbit.src = sitSrc;
                    isJumping = false;
                }
            }, 16);
        });

        socket.on('move-left', () => {
            console.log('Rabbit moving left');
            if (isRunnerActive) return;
            if (walkInterval) clearInterval(walkInterval);
            currentLeft -= 100;
            rabbit.style.left = currentLeft + 'px';
            let isRunning = false;
            walkInterval = setInterval(() => {
                rabbit.src = isRunning ? 'assets/img/rabbitsittingleft.png' : 'assets/img/rabbitrunningleft.png';
                isRunning = !isRunning;
            }, 300);
            setTimeout(() => {
                clearInterval(walkInterval);
                walkInterval = null;
                rabbit.src = 'assets/img/rabbitsittingleft.png';
            }, 2000);
        });

        socket.on('move-right', () => {
            console.log('Rabbit moving right');
            if (isRunnerActive) return;
            if (walkInterval) clearInterval(walkInterval);
            currentLeft += 100;
            rabbit.style.left = currentLeft + 'px';
            let isRunning = false;
            walkInterval = setInterval(() => {
                rabbit.src = isRunning ? 'assets/img/rabbit-sittingright.png' : 'assets/img/rabbitrunningright.png';
                isRunning = !isRunning;
            }, 300);
            setTimeout(() => {
                clearInterval(walkInterval);
                walkInterval = null;
                rabbit.src = 'assets/img/rabbit-sittingright.png';
            }, 2000);
        });

        let appleTimerInterval = null;
        let caughtApples = 0;

        function showAppleTimer(seconds) {
            const timer = document.getElementById('apple-timer');
            timer.textContent = `Appels vallen: ${seconds}s`;
            timer.classList.remove('hidden');
        }

        function hideAppleTimer() {
            const timer = document.getElementById('apple-timer');
            timer.classList.add('hidden');
            if (appleTimerInterval) {
                clearInterval(appleTimerInterval);
                appleTimerInterval = null;
            }
        }

        function checkCollision(appleEl) {
            const aRect = appleEl.getBoundingClientRect();
            const rRect = rabbit.getBoundingClientRect();
            return (
                aRect.left < rRect.right &&
                aRect.right > rRect.left &&
                aRect.top < rRect.bottom &&
                aRect.bottom > rRect.top
            );
        }

        function createFallingApple() {
            const apple = document.createElement('img');
            apple.src = 'assets/img/apple.png';
            apple.style.position = 'fixed';
            apple.style.width = '40px';
            apple.style.height = '40px';
            apple.style.userSelect = 'none';
            apple.style.zIndex = '10';
            apple.style.pointerEvents = 'none';

            const treeElement = document.getElementById('tree');
            if (!treeElement) return;

            const treeRect = treeElement.getBoundingClientRect();
            const startX = treeRect.left + treeRect.width * 0.45 + Math.random() * (treeRect.width * 0.2) - 20;
            const startY = treeRect.top + treeRect.height * 0.18;

            apple.style.left = startX + 'px';
            apple.style.top = startY + 'px';
            document.body.appendChild(apple);

            let currentY = startY;
            const speed = 3;
            const maxY = window.innerHeight - 150;
            let caught = false;

            const fallInterval = setInterval(() => {
                currentY += speed;
                apple.style.top = currentY + 'px';

                if (!caught && checkCollision(apple)) {
                    caught = true;
                    clearInterval(fallInterval);
                    apple.remove();
                    caughtApples++;
                    console.log('Apple caught! Total:', caughtApples);
                } else if (currentY > maxY) {
                    clearInterval(fallInterval);
                    if (apple.parentNode) apple.remove();
                }
            }, 30);

            setTimeout(() => {
                clearInterval(fallInterval);
                if (apple.parentNode) apple.remove();
            }, 20000);
        }
        
        function startAppleFall() {
            console.log('Starting apple fall');
            caughtApples = 0;
            const appleCount = 5;
            const interval = 4000;
            let countdown = 20;
            showAppleTimer(countdown);
            if (appleTimerInterval) {
                clearInterval(appleTimerInterval);
            }
            appleTimerInterval = setInterval(() => {
                countdown -= 1;
                if (countdown <= 0) {
                    hideAppleTimer();
                } else {
                    showAppleTimer(countdown);
                }
            }, 1000);

            for (let i = 0; i < appleCount; i++) {
                setTimeout(() => {
                    createFallingApple();
                }, i * interval);
            }

            setTimeout(() => {
                hideAppleTimer();
                console.log('Apples done, caught:', caughtApples);
                for (let i = 0; i < caughtApples; i++) {
                    increaseBar('food');
                }
            }, 20000);
        }

        // Honger en dorst sneller: elke 8 seconden
        setInterval(() => decreaseBar(fills.food), 8000);
        setInterval(() => decreaseBar(fills.water), 8000);

        // Spelen en slapen langzamer: elke 12 seconden
        setInterval(() => decreaseBar(fills.play), 12000);
        setInterval(() => decreaseBar(fills.sleep), 12000);
    </script>
</body>
</html>
