<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <title>Tamagotchi</title>
</head>
<body>
    <img src="assets/img/sun.png" id="sun" alt="sun">

    <div id="apple-timer" class="timer hidden">Appels vallen: 20s</div>

    <div id="tamagotchi-moodchecker" class="card">
        <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="smile"></div>
        </div>
        <h1>Prima!</h1>
        <div class="mood-rows">
            <article class="mood-row">
                <span>Honger</span>
                <div class="track track-food">
                    <div class="fill" style="width: 80%"></div>
                    <img src="assets/img/carrot.png" alt="wortel" id="wortel" class="icon">
                </div>
            </article>
            <article class="mood-row">
                <span>Spelen</span>
                <div class="track track-play">
                    <div class="fill" style="width: 65%"></div>
                    <img src="assets/img/toys.png" alt="spelen" class="icon">
                </div>
            </article>
            <article class="mood-row">
                <span>Dorst</span>
                <div class="track track-water">
                    <div class="fill" style="width: 55%"></div>
                    <img src="assets/img/water.png" alt="water" class="icon">
                </div>
            </article>
            <article class="mood-row">
                <span>Slaap</span>
                <div class="track track-sleep">
                    <div class="fill" style="width: 45%"></div>
                    <img src="assets/img/pillow.png" alt="slaap" class="icon">
                </div>
            </article>
        </div>
    </div>

    <img src="assets/img/rabbit-sittingright.png" alt="rabbit sitting" id="rabbit-sitting">

    <img src="assets/img/tree.png" alt="tree" id="tree">

    <img src="assets/img/grass.png" id="grass" alt="grass">

    <div id="game-obstacles" class="hidden"></div>
    <div id="game-hud" class="hidden">
        <span id="runner-distance">Finish: 100%</span>
    </div>

    <div id="death-overlay" class="hidden">
        <div class="death-content">
            <h2>Je konijn is dood...</h2>
            <button id="respawn-btn">Opnieuw beginnen</button>
        </div>
    </div>

    <script>
        const socketHost = window.location.hostname || 'localhost';
        const socket = io('http://' + socketHost + ':3000');
        console.log('Index connected to socket');
        socket.on('connect', () => console.log('Index socket connected:', socket.id));
        socket.on('connect_error', (error) => console.error('Index socket error:', error.message));

        let isDead = false;
        const decayIntervals = [];

        const fills = {
            food: document.querySelector('.track-food .fill'),
            play: document.querySelector('.track-play .fill'),
            water: document.querySelector('.track-water .fill'),
            sleep: document.querySelector('.track-sleep .fill')
        };

        // Load saved values from localStorage
        Object.keys(fills).forEach(key => {
            const saved = localStorage.getItem(`tamagotchi-${key}`);
            if (saved) {
                fills[key].style.width = saved;
            }
        });

        // Update face and text based on average mood
        function updateMood() {
            const avg = Object.values(fills).reduce((sum, fill) => sum + parseInt(fill.style.width), 0) / 4;
            const face = document.querySelector('.face');
            const h1 = document.querySelector('h1');
            face.className = 'face'; // reset classes
            if (avg > 75) {
                face.classList.add('wonderful');
                h1.textContent = 'Geweldig!';
            } else if (avg > 50) {
                face.classList.add('ok');
                h1.textContent = 'Prima!';
            } else if (avg > 25) {
                face.classList.add('sad');
                h1.textContent = 'Matig';
            } else {
                face.classList.add('angry');
                h1.textContent = 'Slecht';
            }
        }

        // Initial update
        updateMood();

        // Save current values to localStorage
        function saveBars() {
            Object.keys(fills).forEach(key => {
                localStorage.setItem(`tamagotchi-${key}`, fills[key].style.width);
            });
        }

        function checkDeath() {
            if (isDead) return;
            const allZero = Object.values(fills).every(fill => parseInt(fill.style.width) <= 0);
            if (allZero) triggerDeath();
        }

        function triggerDeath() {
            isDead = true;

            // Stop alle decay intervals
            decayIntervals.forEach(id => clearInterval(id));
            decayIntervals.length = 0;

            // Stop lopende bewegingen
            if (moveInterval) { clearInterval(moveInterval); moveInterval = null; }
            if (walkInterval) { clearInterval(walkInterval); walkInterval = null; }
            direction = 0;

            // Stop runner minigame als die actief is
            if (isRunnerActive) {
                if (runnerFrame) { cancelAnimationFrame(runnerFrame); runnerFrame = null; }
                isRunnerActive = false;
                gameObstacles.classList.add('hidden');
                gameHud.classList.add('hidden');
                resetRunnerVisuals();
            }

            // Visueel: konijn kantelt, dead face
            rabbit.style.transform = 'rotate(180deg)';
            const face = document.querySelector('.face');
            face.className = 'face dead';
            document.querySelector('h1').textContent = 'Dood!';

            // Toon death overlay
            document.getElementById('death-overlay').classList.remove('hidden');

            // Wis localStorage
            localStorage.removeItem('tamagotchi-food');
            localStorage.removeItem('tamagotchi-play');
            localStorage.removeItem('tamagotchi-water');
            localStorage.removeItem('tamagotchi-sleep');

            socket.emit('rabbit-died');
        }

        function respawnRabbit() {
            // Reset bars
            fills.food.style.width = '80%';
            fills.play.style.width = '65%';
            fills.water.style.width = '55%';
            fills.sleep.style.width = '45%';
            saveBars();

            // Reset konijn visueel
            rabbit.style.transform = '';
            rabbit.src = 'assets/img/rabbit-sittingright.png';
            rabbit.style.left = '0px';
            rabbit.style.bottom = '90px';
            currentLeft = 0;

            // Herleef
            isDead = false;
            updateMood();

            // Verberg overlay
            document.getElementById('death-overlay').classList.add('hidden');

            // Herstart decay intervals
            startDecayIntervals();

            socket.emit('rabbit-respawned');
        }

        document.getElementById('respawn-btn').addEventListener('click', respawnRabbit);

        function startDecayIntervals() {
            decayIntervals.length = 0;
            decayIntervals.push(setInterval(() => decreaseBar(fills.food), 8000));
            decayIntervals.push(setInterval(() => decreaseBar(fills.water), 8000));
            decayIntervals.push(setInterval(() => decreaseBar(fills.play), 12000));
            decayIntervals.push(setInterval(() => decreaseBar(fills.sleep), 12000));
        }

        function decreaseBar(fill, amount = 1) {
            if (isDead) return;
            let current = parseInt(fill.style.width);
            if (current > 0) {
                fill.style.width = (current - amount) + '%';
                saveBars();
                updateMood();
            }
            checkDeath();
        }

        function increaseBar(bar) {
            if (isDead) return;
            console.log('Increasing bar:', bar);
            const fill = fills[bar];
            if (!fill) return;
            let current = parseInt(fill.style.width);
            if (current < 100) {
                fill.style.width = Math.min(100, current + 5) + '%';
                saveBars();
                updateMood();
            }
        }

        socket.on('increase-bar', (bar) => {
            if (isDead) return;
            increaseBar(bar);
        });

        socket.on('increase-all', () => {
            if (isDead) return;
            console.log('Increasing all bars');
            Object.keys(fills).forEach(key => {
                const fill = fills[key];
                let current = parseInt(fill.style.width);
                if (current < 100) {
                    fill.style.width = Math.min(100, current + 5) + '%';
                }
            });
            saveBars();
            updateMood();
        });

        socket.on('fall-apples', () => {
            if (isDead) return;
            console.log('Apples falling!');
            startAppleFall();
        });

        const rabbit = document.getElementById('rabbit-sitting');
        const gameObstacles = document.getElementById('game-obstacles');
        const gameHud = document.getElementById('game-hud');
        const runnerObstacles = gameObstacles;
        const runnerDistance = document.getElementById('runner-distance');
        let walkInterval = null;
        let moveInterval = null;
        let currentLeft = 0;
        let direction = 0; // -1 for left, 1 for right, 0 for stop
        let isRunnerActive = false;
        let runnerJumping = false;
        let runnerRabbitBottom = 90;
        let runnerVelocity = 0;
        let runnerFrame = null;
        let runnerStartTs = 0;
        let runnerElapsed = 0;
        let runnerLastTs = 0;
        let runnerLastSpawnTs = 0;
        let runnerObstaclesList = [];
        let runnerFinished = false;
        let runnerNextSpawnDelay = 1400;
        let finishFlag = null;
        let finishFlagX = 0;
        let finishSpawned = false;
        const runnerDurationMs = 13000;
        const runnerGroundBottom = 90;

        let savedLeft = 0; // bewaar positie voor na de game

        function resetRunnerVisuals() {
            runnerRabbitBottom = runnerGroundBottom;
            rabbit.style.bottom = runnerRabbitBottom + 'px';
            rabbit.src = 'assets/img/rabbit-sittingright.png';
            runnerObstacles.innerHTML = '';
            runnerObstaclesList = [];
            runnerDistance.textContent = 'Finish: 100%';
            runnerFinished = false;
            finishFlag = null;
            finishSpawned = false;
        }

        function spawnFinishFlag() {
            const pole = document.createElement('div');
            pole.className = 'runner-finish';
            const flag = document.createElement('div');
            flag.className = 'runner-finish-flag';
            pole.appendChild(flag);
            runnerObstacles.appendChild(pole);
            finishFlagX = window.innerWidth + 20;
            pole.style.left = finishFlagX + 'px';
            finishFlag = pole;
            finishSpawned = true;
        }

        function spawnFence() {
            const fence = document.createElement('img');
            fence.src = 'assets/img/fence.png';
            fence.alt = 'hek';
            fence.className = 'runner-fence';
            runnerObstacles.appendChild(fence);
            runnerObstaclesList.push({
                el: fence,
                x: window.innerWidth + 20,
                width: 86,
                height: 80
            });
        }

        function startRunnerGame() {
            if (isRunnerActive) return;
            isRunnerActive = true;
            runnerJumping = false;
            runnerVelocity = 0;

            // Bewaar huidige positie en zet konijn op startpositie
            savedLeft = currentLeft;
            currentLeft = 50;
            rabbit.style.left = currentLeft + 'px';

            // Stop lopende bewegingen
            if (moveInterval) { clearInterval(moveInterval); moveInterval = null; }
            if (walkInterval) { clearInterval(walkInterval); walkInterval = null; }
            direction = 0;

            resetRunnerVisuals();
            rabbit.src = 'assets/img/rabbitrunningright.png';
            rabbit.style.zIndex = '5';
            gameObstacles.classList.remove('hidden');
            gameHud.classList.remove('hidden');
            runnerStartTs = performance.now();
            runnerLastTs = runnerStartTs;
            runnerLastSpawnTs = runnerStartTs;
            runnerNextSpawnDelay = 1400;
            runnerFrame = requestAnimationFrame(updateRunnerGame);
        }

        function stopRunnerGame(win) {
            isRunnerActive = false;
            if (runnerFrame) {
                cancelAnimationFrame(runnerFrame);
                runnerFrame = null;
            }

            if (win) {
                runnerDistance.textContent = 'Finish gehaald! +20 spelen';
                for (let i = 0; i < 4; i++) {
                    increaseBar('play');
                }
            } else {
                runnerDistance.textContent = 'Botsing! Probeer opnieuw';
            }

            setTimeout(() => {
                gameObstacles.classList.add('hidden');
                gameHud.classList.add('hidden');
                rabbit.style.zIndex = '1';
                resetRunnerVisuals();
                // Herstel positie van voor de game
                currentLeft = savedLeft;
                rabbit.style.left = currentLeft + 'px';
            }, 1800);
        }

        function triggerRunnerJump() {
            if (!isRunnerActive || runnerJumping) return;
            runnerJumping = true;
            runnerVelocity = 1.0; // pixels per ms upward → max hoogte ~250px, lekker hoog over hek
        }

        function detectRunnerCollision(fenceData) {
            // Alleen de voetjes van het konijn tellen als hitbox
            const rabbitHitLeft = currentLeft + 70;
            const rabbitHitRight = currentLeft + 145;
            const rabbitFeetBottom = runnerRabbitBottom;
            const rabbitFeetTop = runnerRabbitBottom + 40; // alleen onderste 40px (voeten)

            const fenceLeft = fenceData.x + 12;
            const fenceRight = fenceData.x + fenceData.width - 12;
            const fenceTop = runnerGroundBottom + fenceData.height;

            // Botsing alleen als de voeten lager zijn dan de bovenkant van het hek
            return (
                rabbitHitLeft < fenceRight &&
                rabbitHitRight > fenceLeft &&
                rabbitFeetBottom < fenceTop &&
                rabbitFeetTop > runnerGroundBottom
            );
        }

        function updateRunnerGame(ts) {
            if (!isRunnerActive) return;

            const delta = ts - runnerLastTs;
            runnerLastTs = ts;
            runnerElapsed = ts - runnerStartTs;

            // Spawn finish vlag 2.5s voor het einde
            if (!finishSpawned && runnerElapsed >= runnerDurationMs - 2500) {
                spawnFinishFlag();
            }

            // Spawn hekjes met variabel interval, stop met spawnen als finish vlag er al is
            if (!finishSpawned && ts - runnerLastSpawnTs > runnerNextSpawnDelay) {
                spawnFence();
                runnerLastSpawnTs = ts;
                runnerNextSpawnDelay = 1400 + Math.random() * 800;
            }

            if (runnerJumping) {
                const gravity = 0.002; // pixels per ms^2 — snappy feel
                runnerRabbitBottom += runnerVelocity * delta;
                runnerVelocity -= gravity * delta;
                if (runnerRabbitBottom <= runnerGroundBottom) {
                    runnerRabbitBottom = runnerGroundBottom;
                    runnerVelocity = 0;
                    runnerJumping = false;
                }
                rabbit.style.bottom = runnerRabbitBottom + 'px';
            }

            const speed = 0.35 * delta;
            runnerObstaclesList = runnerObstaclesList.filter((fenceData) => {
                fenceData.x -= speed;
                fenceData.el.style.left = fenceData.x + 'px';

                if (detectRunnerCollision(fenceData)) {
                    stopRunnerGame(false);
                    return false;
                }

                if (fenceData.x < -fenceData.width) {
                    fenceData.el.remove();
                    return false;
                }
                return true;
            });

            // Beweeg finish vlag mee en check of konijn de finish bereikt
            if (finishFlag) {
                finishFlagX -= speed;
                finishFlag.style.left = finishFlagX + 'px';

                // Gewonnen als de vlag het konijn bereikt
                if (finishFlagX <= currentLeft + 140 && !runnerFinished) {
                    runnerFinished = true;
                    stopRunnerGame(true);
                    return;
                }
            }

            const remainingPct = Math.max(0, Math.ceil((1 - runnerElapsed / runnerDurationMs) * 100));
            runnerDistance.textContent = `Finish: ${remainingPct}%`;

            // Running animation: wissel tussen ren en zit sprite (zoals bij lopen)
            if (!runnerJumping) {
                rabbit.src = Math.floor(ts / 180) % 2 === 0
                    ? 'assets/img/rabbitrunningright.png'
                    : 'assets/img/rabbit-sittingright.png';
            } else {
                rabbit.src = 'assets/img/rabbitrunningright.png';
            }
            runnerFrame = requestAnimationFrame(updateRunnerGame);
        }

        socket.on('start-run-level', () => {
            if (isDead) return;
            console.log('Starting runner mini-game');
            startRunnerGame();
        });

        socket.on('start-move-left', () => {
            if (isDead) return;
            console.log('Received start-move-left');
            if (isRunnerActive) return;
            if (moveInterval) clearInterval(moveInterval);
            direction = -1;
            let isRunning = false;
            moveInterval = setInterval(() => {
                currentLeft += direction * 18;
                rabbit.style.left = currentLeft + 'px';
                rabbit.src = isRunning ? 'assets/img/rabbitsittingleft.png' : 'assets/img/rabbitrunningleft.png';
                isRunning = !isRunning;
            }, 200);
        });

        socket.on('stop-move-left', () => {
            if (isDead) return;
            console.log('Received stop-move-left');
            if (isRunnerActive) return;
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
            rabbit.src = 'assets/img/rabbitsittingleft.png';
            direction = 0;
        });

        socket.on('start-move-right', () => {
            if (isDead) return;
            console.log('Received start-move-right');
            if (isRunnerActive) return;
            if (moveInterval) clearInterval(moveInterval);
            direction = 1;
            let isRunning = false;
            moveInterval = setInterval(() => {
                currentLeft += direction * 18;
                rabbit.style.left = currentLeft + 'px';
                rabbit.src = isRunning ? 'assets/img/rabbit-sittingright.png' : 'assets/img/rabbitrunningright.png';
                isRunning = !isRunning;
            }, 200);
        });

        socket.on('stop-move-right', () => {
            if (isDead) return;
            console.log('Received stop-move-right');
            if (isRunnerActive) return;
            if (moveInterval) {
                clearInterval(moveInterval);
                moveInterval = null;
            }
            rabbit.src = 'assets/img/rabbit-sittingright.png';
            direction = 0;
        });

        let isJumping = false;
        const groundBottom = 90;

        socket.on('jump', () => {
            if (isDead) return;
            if (isRunnerActive) {
                triggerRunnerJump();
                return;
            }
            if (isJumping) return;
            isJumping = true;
            let currentBottom = groundBottom;
            let velocity = 12;

            // animatie tijdens sprong richting meeloop
            let jumpAnim = false;
            const isLeft = rabbit.src.includes('left');
            const runSrc = isLeft ? 'assets/img/rabbitrunningleft.png' : 'assets/img/rabbitrunningright.png';
            const sitSrc = isLeft ? 'assets/img/rabbitsittingleft.png' : 'assets/img/rabbit-sittingright.png';

            const animInterval = setInterval(() => {
                rabbit.src = jumpAnim ? runSrc : sitSrc;
                jumpAnim = !jumpAnim;
            }, 150);

            const jumpInterval = setInterval(() => {
                currentBottom += velocity;
                velocity -= 0.5;
                rabbit.style.bottom = currentBottom + 'px';

                if (currentBottom <= groundBottom && velocity < 0) {
                    clearInterval(jumpInterval);
                    clearInterval(animInterval);
                    rabbit.style.bottom = groundBottom + 'px';
                    rabbit.src = sitSrc;
                    isJumping = false;
                }
            }, 16);
        });

        socket.on('move-left', () => {
            if (isDead) return;
            console.log('Rabbit moving left');
            if (isRunnerActive) return;
            if (walkInterval) clearInterval(walkInterval);
            currentLeft -= 100;
            rabbit.style.left = currentLeft + 'px';
            let isRunning = false;
            walkInterval = setInterval(() => {
                rabbit.src = isRunning ? 'assets/img/rabbitsittingleft.png' : 'assets/img/rabbitrunningleft.png';
                isRunning = !isRunning;
            }, 300);
            setTimeout(() => {
                clearInterval(walkInterval);
                walkInterval = null;
                rabbit.src = 'assets/img/rabbitsittingleft.png';
            }, 2000);
        });

        socket.on('move-right', () => {
            if (isDead) return;
            console.log('Rabbit moving right');
            if (isRunnerActive) return;
            if (walkInterval) clearInterval(walkInterval);
            currentLeft += 100;
            rabbit.style.left = currentLeft + 'px';
            let isRunning = false;
            walkInterval = setInterval(() => {
                rabbit.src = isRunning ? 'assets/img/rabbit-sittingright.png' : 'assets/img/rabbitrunningright.png';
                isRunning = !isRunning;
            }, 300);
            setTimeout(() => {
                clearInterval(walkInterval);
                walkInterval = null;
                rabbit.src = 'assets/img/rabbit-sittingright.png';
            }, 2000);
        });

        let appleTimerInterval = null;
        let caughtApples = 0;

        function showAppleTimer(seconds) {
            const timer = document.getElementById('apple-timer');
            timer.textContent = `Appels vallen: ${seconds}s`;
            timer.classList.remove('hidden');
        }

        function hideAppleTimer() {
            const timer = document.getElementById('apple-timer');
            timer.classList.add('hidden');
            if (appleTimerInterval) {
                clearInterval(appleTimerInterval);
                appleTimerInterval = null;
            }
        }

        function checkCollision(appleEl) {
            const aRect = appleEl.getBoundingClientRect();
            const rRect = rabbit.getBoundingClientRect();
            return (
                aRect.left < rRect.right &&
                aRect.right > rRect.left &&
                aRect.top < rRect.bottom &&
                aRect.bottom > rRect.top
            );
        }

        function createFallingApple() {
            const apple = document.createElement('img');
            apple.src = 'assets/img/apple.png';
            apple.style.position = 'fixed';
            apple.style.width = '40px';
            apple.style.height = '40px';
            apple.style.userSelect = 'none';
            apple.style.zIndex = '10';
            apple.style.pointerEvents = 'none';

            const treeElement = document.getElementById('tree');
            if (!treeElement) return;

            const treeRect = treeElement.getBoundingClientRect();
            const startX = treeRect.left + treeRect.width * 0.45 + Math.random() * (treeRect.width * 0.2) - 20;
            const startY = treeRect.top + treeRect.height * 0.18;

            apple.style.left = startX + 'px';
            apple.style.top = startY + 'px';
            document.body.appendChild(apple);

            let currentY = startY;
            const speed = 3;
            const maxY = window.innerHeight - 150;
            let caught = false;

            const fallInterval = setInterval(() => {
                currentY += speed;
                apple.style.top = currentY + 'px';

                if (!caught && checkCollision(apple)) {
                    caught = true;
                    clearInterval(fallInterval);
                    apple.remove();
                    caughtApples++;
                    console.log('Apple caught! Total:', caughtApples);
                } else if (currentY > maxY) {
                    clearInterval(fallInterval);
                    if (apple.parentNode) apple.remove();
                }
            }, 30);

            setTimeout(() => {
                clearInterval(fallInterval);
                if (apple.parentNode) apple.remove();
            }, 20000);
        }
        
        function startAppleFall() {
            console.log('Starting apple fall');
            caughtApples = 0;
            const appleCount = 5;
            const interval = 4000;
            let countdown = 20;
            showAppleTimer(countdown);
            if (appleTimerInterval) {
                clearInterval(appleTimerInterval);
            }
            appleTimerInterval = setInterval(() => {
                countdown -= 1;
                if (countdown <= 0) {
                    hideAppleTimer();
                } else {
                    showAppleTimer(countdown);
                }
            }, 1000);

            for (let i = 0; i < appleCount; i++) {
                setTimeout(() => {
                    createFallingApple();
                }, i * interval);
            }

            setTimeout(() => {
                hideAppleTimer();
                console.log('Apples done, caught:', caughtApples);
                for (let i = 0; i < caughtApples; i++) {
                    increaseBar('food');
                }
            }, 20000);
        }

        // Start decay intervals
        startDecayIntervals();

        // Respawn vanuit controller
        socket.on('respawn-rabbit', () => {
            if (isDead) respawnRabbit();
        });
    </script>
</body>
</html>
