<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>Tamagotchi

    </title>
</head>
<body>
    <main class="controller-screen">
        <div class="corner top-left">
            <div class="status action-food"><img src="assets/img/carrot.png" alt="Carrot" id="carrotfood"></div>
            <div class="status action-fruit small"><img src="assets/img/apple.png" alt="Apple"></div>
        </div>
        <div class="corner top-right">
            <div class="status action-play"><img src="assets/img/toys.png" alt="Play"></div>
        </div>
        <div class="corner bottom-left">
            <div class="status action-water"><img src="assets/img/water.png" alt="Water"></div>
        </div>
        <div class="corner bottom-right">
            <div class="status action-sleep"><img src="assets/img/pillow.png" alt="Sleep"></div>
        </div>

        <section class="dpad">
            <button class="dpad-btn up" aria-label="Up">↑</button>
            <div class="dpad-row">
                <button class="dpad-btn left" aria-label="Left">←</button>
                <button class="dpad-btn right" aria-label="Right">→</button>
            </div>
            <button class="dpad-btn down" aria-label="Down">↓</button>
        </section>
    </main>
</body>
</html>
