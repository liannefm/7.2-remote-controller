<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <title>Tamagotchi

    </title>
</head>
<body>
    <main class="controller-screen">
        <div class="corner top-left">
            <div class="status action-food"><img src="assets/img/carrot.png" alt="Carrot" id="carrotfood"></div>
            <div class="status action-fruit small"><img src="assets/img/apple.png" alt="Apple"></div>
        </div>
        <div class="corner top-right">
            <div class="status action-rabbit small"><img src="assets/img/rabbit-sittingright.png" alt="Rabbit"></div>
            <div class="status action-play"><img src="assets/img/toys.png" alt="Play"></div>
        </div>
        <div class="corner bottom-left">
            <div class="status action-water"><img src="assets/img/water.png" alt="Water"></div>
        </div>
        <div class="corner bottom-right">
            <div class="status action-sleep"><img src="assets/img/pillow.png" alt="Sleep"></div>
        </div>

        <section class="dpad">
            <button class="dpad-btn up" aria-label="Up">↑</button>
            <div class="dpad-row">
                <button class="dpad-btn left" aria-label="Left">←</button>
                <button class="dpad-btn right" aria-label="Right">→</button>
            </div>
            <!-- <button class="dpad-btn down" aria-label="Down">↓</button> -->
        </section>
        <div id="controller-death-overlay" class="hidden">
            <button id="controller-respawn-btn">Opnieuw beginnen</button>
        </div>
    </main>

    <script>
        const socketHost = window.location.hostname || 'localhost';
        const socket = io('http://' + socketHost + ':3000');
        console.log('Controller connected to socket');
        socket.on('connect', () => console.log('Socket connected:', socket.id));
        socket.on('connect_error', (error) => console.error('Socket error:', error.message));

        // Detect touch device to prevent double-firing (touch + click)
        let usesTouch = false;
        window.addEventListener('touchstart', () => { usesTouch = true; }, { once: true });

        function handleActionPress(event) {
            // On touch devices, ignore click events (touchstart already handled it)
            if (usesTouch && event.type === 'click') return;

            const actionEl = event.target.closest('.status');
            if (!actionEl) return;

            // Visual feedback
            actionEl.classList.add('pressed');
            setTimeout(() => actionEl.classList.remove('pressed'), 200);

            if (actionEl.classList.contains('action-food')) {
                socket.emit('increase-bar', 'food');
                return;
            }
            if (actionEl.classList.contains('action-fruit')) {
                socket.emit('fall-apples');
                return;
            }
            if (actionEl.classList.contains('action-play')) {
                socket.emit('increase-bar', 'play');
                return;
            }
            if (actionEl.classList.contains('action-rabbit')) {
                socket.emit('start-run-level');
                return;
            }
            if (actionEl.classList.contains('action-water')) {
                socket.emit('increase-bar', 'water');
                return;
            }
            if (actionEl.classList.contains('action-sleep')) {
                socket.emit('increase-bar', 'sleep');
            }
        }

        const controllerScreen = document.querySelector('.controller-screen');
        controllerScreen.addEventListener('click', handleActionPress);
        controllerScreen.addEventListener('touchstart', handleActionPress, { passive: true });

        // D-pad: jump
        const btnUp = document.querySelector('.dpad-btn.up');
        btnUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            socket.emit('jump');
        }, { passive: false });
        btnUp.addEventListener('click', () => {
            if (!usesTouch) socket.emit('jump');
        });

        // D-pad: left
        const btnLeft = document.querySelector('.dpad-btn.left');
        btnLeft.addEventListener('touchstart', (e) => {
            e.preventDefault();
            socket.emit('start-move-left');
        }, { passive: false });
        btnLeft.addEventListener('touchend', (e) => {
            e.preventDefault();
            socket.emit('stop-move-left');
        }, { passive: false });
        btnLeft.addEventListener('touchcancel', () => {
            socket.emit('stop-move-left');
        });
        btnLeft.addEventListener('mousedown', () => {
            if (!usesTouch) socket.emit('start-move-left');
        });
        btnLeft.addEventListener('mouseup', () => {
            if (!usesTouch) socket.emit('stop-move-left');
        });
        btnLeft.addEventListener('mouseleave', () => {
            if (!usesTouch) socket.emit('stop-move-left');
        });

        // D-pad: right
        const btnRight = document.querySelector('.dpad-btn.right');
        btnRight.addEventListener('touchstart', (e) => {
            e.preventDefault();
            socket.emit('start-move-right');
        }, { passive: false });
        btnRight.addEventListener('touchend', (e) => {
            e.preventDefault();
            socket.emit('stop-move-right');
        }, { passive: false });
        btnRight.addEventListener('touchcancel', () => {
            socket.emit('stop-move-right');
        });
        btnRight.addEventListener('mousedown', () => {
            if (!usesTouch) socket.emit('start-move-right');
        });
        btnRight.addEventListener('mouseup', () => {
            if (!usesTouch) socket.emit('stop-move-right');
        });
        btnRight.addEventListener('mouseleave', () => {
            if (!usesTouch) socket.emit('stop-move-right');
        });

        // Death / respawn
        socket.on('rabbit-died', () => {
            document.getElementById('controller-death-overlay').classList.remove('hidden');
        });

        socket.on('rabbit-respawned', () => {
            document.getElementById('controller-death-overlay').classList.add('hidden');
        });

        const respawnBtn = document.getElementById('controller-respawn-btn');
        respawnBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            socket.emit('respawn-rabbit');
        }, { passive: false });
        respawnBtn.addEventListener('click', () => {
            if (!usesTouch) socket.emit('respawn-rabbit');
        });
    </script>
</body>
</html>
